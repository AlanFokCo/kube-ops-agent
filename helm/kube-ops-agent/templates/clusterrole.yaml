{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kube-ops-agent.fullname" . }}
  labels:
    {{- include "kube-ops-agent.labels" . | nindent 4 }}
rules:
  # Read-only permissions for kubectl get/list cluster resources
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - nodes
      - namespaces
      - services
      - configmaps
      - secrets
      - persistentvolumes
      - persistentvolumeclaims
      - events
    verbs: [get, list, watch]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: [get, list, watch]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: [get, list, watch]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs: [get, list, watch]
  - apiGroups: ["metrics.k8s.io"]
    resources:
      - pods
      - nodes
    verbs: [get, list]
{{- end }}
