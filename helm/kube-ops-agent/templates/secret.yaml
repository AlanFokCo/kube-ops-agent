{{- if not .Values.openai.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kube-ops-agent.fullname" . }}-openai
  labels:
    {{- include "kube-ops-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.openai.secretKey }}: {{ required "openai.apiKey is required. Use: helm install ... --set openai.apiKey=YOUR_OPENAI_KEY" .Values.openai.apiKey | quote }}
{{- end }}
